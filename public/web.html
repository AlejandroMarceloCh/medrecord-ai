<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MedRecord AI</title>
<meta name="description" content="Documentación clínica asistida por IA."/>
<meta name="theme-color" content="#0D9488"/>
<link rel="icon" type="image/svg+xml" href="/icon.svg"/>
<link rel="manifest" href="/manifest-web.webmanifest"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Bricolage Grotesque',system-ui,sans-serif;background:#F8F6F1;color:#1C1917;-webkit-font-smoothing:antialiased}
#root{height:100vh;display:flex;flex-direction:column}

:root{
  --accent:#0D9488;--accent-strong:#0F766E;--accent-soft:rgba(13,148,136,.10);--accent-line:rgba(13,148,136,.26);
  --bg:#F8F6F1;--surface:#FFF;--surface-2:#F3F1EB;--surface-3:#EDEAE3;
  --border-subtle:rgba(28,25,23,.08);--border-mid:rgba(28,25,23,.16);
  --text:#1C1917;--muted:#57534E;--faint:#A8A29E;
  --ok:#16A34A;--ok-bg:#F0FDF4;--ok-border:#BBF7D0;
  --warn:#B45309;--warn-bg:#FFFBEB;--warn-border:#FDE68A;--warn-dot:#D97706;
  --danger:#DC2626;--danger-bg:#FEF2F2;--danger-border:#FECACA;
  --r-btn:8px;--r-card:12px;
  --shadow:0 1px 3px rgba(28,25,23,.05),0 4px 20px rgba(28,25,23,.08);
  --shadow-lg:0 8px 32px rgba(28,25,23,.12),0 2px 8px rgba(28,25,23,.06);
}

/* Animations */
@keyframes mr-spin        { to { transform:rotate(360deg); } }
@keyframes mr-shimmer     { 0%{background-position:-800px 0}100%{background-position:800px 0} }
@keyframes mr-fade        { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
@keyframes mr-slide-right { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }

/* Utility */
.mr-scroll::-webkit-scrollbar{width:4px}
.mr-scroll::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:2px}
.mr-scroll::-webkit-scrollbar-track{background:transparent}
.mr-fade  { animation:mr-fade 0.28s ease both }
.mr-spin  { animation:mr-spin 0.8s linear infinite; display:inline-block }

/* Print */
.print-doc{display:none}
@media print{
  html,body{height:auto;overflow:visible;background:#fff}
  body *{visibility:hidden}
  .print-doc,.print-doc *{visibility:visible}
  .print-doc{display:block;position:absolute;inset:0;width:100%;color:#111;font-size:12px;line-height:1.5}
  @page{size:A4;margin:18mm 16mm}
}
::selection{background:rgba(13,148,136,0.15);color:var(--text)}

/* Keyboard focus — visible solo en navegación por teclado */
:focus{outline:none}
button:focus-visible,a:focus-visible,input:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{
  outline:2px solid var(--accent);outline-offset:2px;border-radius:6px;
}

@media (prefers-reduced-motion: reduce) {
  *,*::before,*::after { animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
}
</style>
</head>
<body>
<div id="root"></div>
<script src="/app.js"></script>
</body>
</html>
