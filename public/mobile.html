<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>MedRecord AI</title>
<meta name="description" content="Graba la consulta y genera la historia clínica automáticamente." />
<meta name="theme-color" content="#0D9488" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="MedRecord" />
<link rel="icon" type="image/svg+xml" href="/icon.svg" />
<link rel="apple-touch-icon" href="/icon-180.png" />
<link rel="manifest" href="/manifest.webmanifest" />
<style>
  /* Sin fuentes de Google: la app tiene que abrir y grabar sin internet. La pila del
     sistema es la que ya usa el teléfono, así que no hay nada que descargar ni que
     esperar, y en un consultorio sin wifi la pantalla no sale en blanco. */
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior: none; }
  body {
    background: var(--bg, #f6f7f9);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  #root { height: 100dvh; }

  .mr-root { color: var(--text); font-size: var(--fs); line-height: 1.5; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-feature-settings: 'tnum'; }

  .mr-root button, .mr-root input { font-family: inherit; }
  .mr-root :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

  .mr-btn {
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: var(--radius); font-weight: 600; letter-spacing: -0.01em;
    transition: filter .15s, transform .06s; white-space: nowrap; user-select: none;
  }
  .mr-btn:active:not(:disabled) { transform: scale(0.985); }

  /* 16px evita el zoom automático de iOS al enfocar un input */
  .mr-input {
    width: 100%; border: 1px solid var(--border-2); border-radius: var(--radius);
    background: var(--surface); color: var(--text); font-family: inherit;
    font-size: 16px; padding: 13px 14px; outline: none; transition: border-color .15s, box-shadow .15s;
  }
  .mr-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .mr-input::placeholder { color: var(--faint); }

  .mr-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); }

  .mr-spin { animation: mr-spin 0.8s linear infinite; }
  @keyframes mr-spin { to { transform: rotate(360deg); } }
  @keyframes mr-fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .mr-fade { animation: mr-fade .3s ease both; }
  @keyframes mr-dot { 0%,100% { transform: scale(0.85); } 50% { transform: scale(1.12); } }
  .mr-dot { animation: mr-dot 1.4s infinite; }

  .mr-scroll::-webkit-scrollbar { width: 0; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>
  <!-- Bundle local compilado con esbuild. Antes esto eran React dev + Babel standalone
       (~3 MB) desde unpkg, transpilando JSX en el navegador: sin internet, la app no
       existía, y con red mala eran segundos de pantalla en blanco con el paciente
       enfrente. -->
  <script src="/mobile.js" defer></script>
</body>
</html>
